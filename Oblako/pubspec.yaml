name: cullinarium
description: "Online platform for food lovers"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  auto_route: ^9.2.2
  build_runner: ^2.4.13
  auto_route_generator: ^9.0.0
  get_it: ^8.0.3
  flutter_bloc: ^9.1.0

  shared_preferences: ^2.5.3
  equatable: ^2.0.7
  loading_animation_widget: ^1.3.0
  url_launcher: ^6.3.1

  image_picker: ^1.1.2
  permission_handler: ^12.0.0+1
  dotted_border: ^2.1.0
  http: ^1.4.0
  uuid: ^4.5.1
  flutter_markdown: ^0.7.7+1
  timeago: ^3.7.1
  chatview: ^2.4.0
  dartz: ^0.10.1
  dio: ^5.8.0+1
  firebase_core: ^3.15.2
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: "^0.14.3"

flutter:

  uses-material-design: true

  assets:
   - assets/images/
   - assets/icons/
   - assets/fonts/gotham/
   - assets/layout/
   - assets/temp/

  fonts:
    - family: Gotham
      fonts:
        - asset: assets/fonts/gotham/gotham_bold.otf
          weight: 700
        - asset: assets/fonts/gotham/gotham_light.otf
          weight: 300
        - asset: assets/fonts/gotham/gotham_medium.otf
          weight: 500
        - asset: assets/fonts/gotham/gotham_book.otf
          weight: 100

